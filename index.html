<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restudio · Script Editor</title>
    <link href="https://fonts.cdnfonts.com/css/tiny5" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Consolas', monospace; margin: 0; padding: 0; background: #1e1e1e; color: #f5f5f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #000; padding: 8px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo { height: 30px; }
        .header-left span { font-family: 'Tiny5', sans-serif; color: #fff; font-size: 20px; }
        .header-buttons { display: flex; gap: 10px; }
        .btn { background: none; border: none; cursor: pointer; padding: 5px; width: 40px; height: 40px; border-radius: 4px; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn:hover { background: #333; }
        .btn svg { width: 24px; height: 24px; fill: #fff; }
        .btn .play-btn { fill: #2eb346; }

        .main-content { display: flex; flex: 1; overflow: hidden; }
        #editor-container { flex: 2; border-right: 1px solid #333; }
        .console-panel { flex: 1; background: #1a1a1a; display: flex; flex-direction: column; }
        .console-header { background: #2d2d2d; padding: 10px; font-family: 'Tiny5', sans-serif; }
        .console-output { flex: 1; padding: 10px; font-size: 14px; overflow-y: auto; background: #121212; }
        .log-entry { margin-bottom: 4px; padding-left: 8px; font-family: 'Consolas', monospace; border-left: 2px solid transparent; display: flex; align-items: flex-start; gap: 6px; }
        .log-icon { font-family: 'Material Symbols Outlined'; font-size: 18px; line-height: 1.4; user-select: none; }
        .log-info { color: #569CD6; border-left-color: #569CD6; }
        .log-success { color: #6A9955; border-left-color: #6A9955; }
        .log-error { color: #F44747; border-left-color: #F44747; }
        .log-warning { color: #ff9800; border-left-color: #ff9800; }
        .log-input { color: #9cdcfe; border-left-color: #9cdcfe; }
        .timestamp { color: #666; margin-right: 8px; }

        .dropdown-menu { position: absolute; top: 55px; right: 15px; background: #2d2d2d; border: 4px solid #444; display: none; z-index: 1000; min-width: 200px; }
        .dropdown-menu.show { display: block; }
        .dropdown-item { padding: 10px 20px; color: #fff; cursor: pointer; font-family: 'Tiny5', sans-serif; display: flex; align-items: center; gap: 10px; }
        .dropdown-item:hover { background: #3d3d3d; }
        .dropdown-item svg { width: 20px; height: 20px; fill: #fff; }

        .user-input { width: 90%; padding: 8px; margin: 5px 0; background: #2d2d2d; color: #fff; border: 1px solid #444; border-radius: 4px; font-family: 'Consolas', monospace; }
        .user-input:focus { outline: none; border-color: #569CD6; }
        .input-prompt { color: #ff9800; margin-bottom: 5px; }

        /* زر download جديد بأيقونة واضحة */
        .btn-download svg { fill: #fff; }
    </style>
</head>
<body>
<header>
    <div class="header-left">
        <img src="https://i.postimg.cc/yYCszSyc/swrh-restudio.png" alt="Logo" class="logo">
        <span>Script Editor</span>
    </div>

    <div class="header-buttons">
        <button class="btn" onclick="runScript()"><svg class="play-btn" viewBox="0 0 24 24"><polygon points="22 11 22 13 21 13 21 14 20 14 20 15 18 15 18 16 16 16 16 17 15 17 15 18 13 18 13 19 11 19 11 20 10 20 10 21 8 21 8 22 6 22 6 23 3 23 3 22 2 22 2 2 3 2 3 1 6 1 6 2 8 2 8 3 10 3 10 4 11 4 11 5 13 5 13 6 15 6 15 7 16 7 16 8 18 8 18 9 20 9 20 10 21 10 21 11 22 11"/></svg></button>
        <button class="btn" onclick="clearConsole()"><svg id="trash-alt-solid" viewBox="0 0 24 24"><polygon points="22 3 22 5 2 5 2 3 8 3 8 2 9 2 9 1 15 1 15 2 16 2 16 3 22 3"/><path d="m4,7v15h1v1h14v-2h1V7H4Zm12,12h-2v-10h2v10Zm-6,0h-2v-10h2v10Z"/></svg></button>
        <button class="btn" onclick="loadExample()"><svg id="code-block" viewBox="0 0 24 24"><polygon points="14 10 13 10 13 8 14 8 14 7 15 7 15 6 16 6 16 5 15 5 15 4 14 4 14 3 13 3 13 1 14 1 14 2 15 2 15 3 16 3 16 4 17 4 17 5 18 5 18 6 17 6 17 7 16 7 16 8 15 8 15 9 14 9 14 10"/><polygon points="2 6 1 6 1 5 2 5 2 4 3 4 3 3 4 3 4 2 5 2 5 1 6 1 6 3 5 3 5 4 4 4 4 5 3 5 3 6 4 6 4 7 5 7 5 8 6 8 6 10 5 10 5 9 4 9 4 8 3 8 3 7 2 7 2 6"/><polygon points="8 10 7 10 7 8 8 8 8 6 9 6 9 4 10 4 10 2 11 2 11 1 12 1 12 3 11 3 11 5 10 5 10 7 9 7 9 9 8 9 8 10"/><polygon points="23 5 23 22 22 22 22 23 2 23 2 22 1 22 1 9 2 9 2 10 3 10 3 21 21 21 21 6 19 6 19 4 22 4 22 5 23 5"/></svg></button>
        <!-- زر download الذي طلبته: أيقونة مختلفة وواضحة -->
        <button class="btn btn-download" onclick="downloadCode()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <polygon points="5 10 4 10 4 8 6 8 6 9 7 9 7 10 8 10 8 11 9 11 9 12 10 12 10 13 11 13 11 1 13 1 13 13 14 13 14 12 15 12 15 11 16 11 16 10 17 10 17 9 18 9 18 8 20 8 20 10 19 10 19 11 18 11 18 12 17 12 17 13 16 13 16 14 15 14 15 15 14 15 14 16 13 16 13 17 11 17 11 16 10 16 10 15 9 15 9 14 8 14 8 13 7 13 7 12 6 12 6 11 5 11 5 10"/>
                <rect x="2" y="21" width="20" height="2"/>
            </svg>
        </button>
        <button class="btn" onclick="toggleSettingsMenu(event)"><svg id="ellipses-vertical" viewBox="0 0 24 24"><path d="m14,18h-1v-1h-2v1h-1v1h-1v2h1v1h1v1h2v-1h1v-1h1v-2h-1v-1Zm-1,3h-2v-2h2v2Z"/><path d="m14,10h-1v-1h-2v1h-1v1h-1v2h1v1h1v1h2v-1h1v-1h1v-2h-1v-1Zm-1,3h-2v-2h2v2Z"/><path d="m14,3v-1h-1v-1h-2v1h-1v1h-1v2h1v1h1v1h2v-1h1v-1h1v-2h-1Zm-3,2v-2h2v2h-2Z"/></svg></button>
    </div>
    <div class="dropdown-menu" id="settingsMenu">
        <!-- زر Download في القائمة -->
        <div class="dropdown-item" onclick="downloadCode()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <polygon points="5 10 4 10 4 8 6 8 6 9 7 9 7 10 8 10 8 11 9 11 9 12 10 12 10 13 11 13 11 1 13 1 13 13 14 13 14 12 15 12 15 11 16 11 16 10 17 10 17 9 18 9 18 8 20 8 20 10 19 10 19 11 18 11 18 12 17 12 17 13 16 13 16 14 15 14 15 15 14 15 14 16 13 16 13 17 11 17 11 16 10 16 10 15 9 15 9 14 8 14 8 13 7 13 7 12 6 12 6 11 5 11 5 10"/>
                <rect x="2" y="21" width="20" height="2"/>
            </svg>
            Download (.roland)
        </div>
        <!-- زر Docs المعدل - يفتح صفحة الوثائق -->
        <div class="dropdown-item" onclick="openDocs()">
            <svg id="check-list" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <rect x="9" y="18" width="14" height="1"/>
                <rect x="9" y="12" width="14" height="1"/>
                <rect x="9" y="6" width="14" height="1"/>
                <polygon points="7 15 8 15 8 17 7 17 7 18 6 18 6 19 5 19 5 20 4 20 4 21 3 21 3 20 2 20 2 19 1 19 1 17 2 17 2 18 3 18 3 19 4 19 4 18 5 18 5 17 6 17 6 16 7 16 7 15"/>
                <polygon points="8 9 8 11 7 11 7 12 6 12 6 13 5 13 5 14 4 14 4 15 3 15 3 14 2 14 2 13 1 13 1 11 2 11 2 12 3 12 3 13 4 13 4 12 5 12 5 11 6 11 6 10 7 10 7 9 8 9"/>
                <polygon points="8 3 8 5 7 5 7 6 6 6 6 7 5 7 5 8 4 8 4 9 3 9 3 8 2 8 2 7 1 7 1 5 2 5 2 6 3 6 3 7 4 7 4 6 5 6 5 5 6 5 6 4 7 4 7 3 8 3"/>
            </svg>
            Docs
        </div>
    </div>
</header>

<div class="main-content">
    <div id="editor-container"></div>
    <div class="console-panel">
        <div class="console-header">ROLAND CONSOLE OUTPUT</div>
        <div class="console-output" id="consoleOutput"></div>
    </div>
</div>

<script>
    // Global variables
    let monacoEditor;
    let waitingForInput = false;
    let currentInputResolve = null;
    let lineCounter = 0;
    let scriptLines = [];
    let currentLineIndex = 0;
    let isRunning = false;
    let variables = {};
    let constants = new Set();
    let varTypes = {};
    let lastLogMessage = '';
    let calculatorEnabled = false;

    // Helper: add message to console with Google icon
    function addToConsole(msg, type = 'info') {
        const out = document.getElementById('consoleOutput');
        const timestamp = new Date().toLocaleTimeString('en-US', { hour12: false });
        
        let icon = 'info';
        if (type === 'success') icon = 'check_circle';
        else if (type === 'error') icon = 'error';
        else if (type === 'warning') icon = 'warning';
        else if (type === 'input') icon = 'input';
        
        if (typeof msg === 'string' && (msg.startsWith('<div') || msg.startsWith('<input'))) {
            out.innerHTML += `<div class="log-entry">${msg}</div>`;
        } else {
            out.innerHTML += `<div class="log-entry log-${type}"><span class="log-icon material-symbols-outlined">${icon}</span><span><span class="timestamp">[${timestamp}]</span> ${msg}</span></div>`;
        }
        out.scrollTop = out.scrollHeight;
    }

    function clearConsole() {
        document.getElementById('consoleOutput').innerHTML = '';
    }

    function stopExecution() {
        isRunning = false;
        waitingForInput = false;
        currentInputResolve = null;
        addToConsole('Execution stopped.', 'warning');
    }

    function resetInterpreter() {
        variables = {};
        constants = new Set();
        varTypes = {};
        lastLogMessage = '';
        calculatorEnabled = false;
        waitingForInput = false;
        currentInputResolve = null;
        lineCounter = 0;
    }

    function validateType(varName, value) {
        const type = varTypes[varName];
        if (!type) return true;

        if (type === 'Dnumber') {
            if (isNaN(parseFloat(value)) || !isFinite(value) || value.toString().includes(' ')) {
                addToConsole(`Type error: Variable "${varName}" is Dnumber and must be assigned a decimal number.`, 'error');
                return false;
            }
        } else if (type === 'var') {
            if (!/^-?\d+$/.test(value.toString())) {
                addToConsole(`Type error: Variable "${varName}" is var and must be assigned an integer.`, 'error');
                return false;
            }
        } else if (type === 'character') {
            if (value.length !== 1) {
                addToConsole(`Type error: Variable "${varName}" is character and must be a single character.`, 'error');
                return false;
            }
        } else if (type === 'word') {
            if (/\s/.test(value)) {
                addToConsole(`Type error: Variable "${varName}" is word and must not contain spaces.`, 'error');
                return false;
            }
        } else if (type === 'TFvar') {
            if (value !== 'true' && value !== 'false') {
                addToConsole(`Type error: Variable "${varName}" is TFvar and must be true or false.`, 'error');
                return false;
            }
        }
        return true;
    }

    // دالة فتح الوثائق - جديدة
    function openDocs() {
        window.location.href = 'https://restudio-games.github.io/Restudio-Docs-For-Roland-Script/';
    }

    function checkSyntax() {
        clearConsole();
        
        const code = monacoEditor.getValue();
        const lines = code.split('\n').map(line => line.trim()).filter(line => line !== '');
        
        if (lines.length === 0) {
            addToConsole('Syntax check: Empty script.', 'warning');
            return;
        }
        
        if (lines[0] !== 'hi roland.script!') {
            addToConsole('Syntax error: Script must start with "hi roland.script!"', 'error');
        } else {
            addToConsole('✓ Script starts correctly with "hi roland.script!"', 'success');
        }
        
        // Check for balanced quotes
        let inString = false;
        let quoteChar = '';
        let quoteErrors = [];
        
        lines.forEach((line, index) => {
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if ((char === '"' || char === "'") && (i === 0 || line[i-1] !== '\\')) {
                    if (!inString) {
                        inString = true;
                        quoteChar = char;
                    } else if (char === quoteChar) {
                        inString = false;
                        quoteChar = '';
                    }
                }
            }
            if (inString) {
                quoteErrors.push(`Line ${index + 1}: Unclosed string`);
            }
        });
        
        if (quoteErrors.length > 0) {
            quoteErrors.forEach(err => addToConsole(err, 'error'));
        } else {
            addToConsole('✓ All strings are properly closed', 'success');
        }
        
        // Check for common commands
        const commands = ['var', 'Dnumber', 'character', 'word', 'TFvar', 'const', 'let', 
                         'if var', 'if typed', 'get lib:', 'reload!', 'greet', 'msg.log:', 
                         'msg.out:', 'pass!', 'end!'];
        
        let unknownCommands = [];
        lines.slice(1).forEach((line, idx) => {
            if (line.startsWith('bookname:')) return;
            
            let known = false;
            for (let cmd of commands) {
                if (line.startsWith(cmd)) {
                    known = true;
                    break;
                }
            }
            
            // Check for variable assignment pattern
            if (!known && /^\w+\s*=/.test(line)) {
                known = true;
            }
            
            if (!known && line !== '') {
                unknownCommands.push(`Line ${idx + 2}: Possibly unknown command - "${line}"`);
            }
        });
        
        if (unknownCommands.length > 0) {
            unknownCommands.forEach(cmd => addToConsole(cmd, 'warning'));
        } else {
            addToConsole('✓ No unknown commands detected', 'success');
        }
        
        addToConsole('Syntax check completed.', 'info');
    }

    function runScript() {
        if (isRunning) {
            addToConsole('Script is already running.', 'warning');
            return;
        }

        clearConsole();
        resetInterpreter();

        const code = monacoEditor.getValue();
        scriptLines = code.split('\n').map(line => line.trim()).filter(line => line !== '');

        if (scriptLines.length === 0 || scriptLines[0] !== 'hi roland.script!') {
            addToConsole('Error: Script must start with "hi roland.script!"', 'error');
            return;
        }

        isRunning = true;
        currentLineIndex = 1;
        lineCounter = 0;
        addToConsole('Starting script execution...', 'info');

        executeNextLine();
    }

    async function executeNextLine() {
        while (isRunning && currentLineIndex < scriptLines.length) {
            if (waitingForInput) {
                return;
            }

            const line = scriptLines[currentLineIndex];
            lineCounter++;

            if (line === 'end!' && lineCounter > 150) {
                addToConsole(`Error: Maximum line limit exceeded (150 lines) at line ${currentLineIndex+1}.`, 'error');
                stopExecution();
                return;
            }

            try {
                const shouldStop = await executeLine(line);
                if (shouldStop === 'STOP') {
                    stopExecution();
                    return;
                }
                if (shouldStop === 'WAIT') {
                    return;
                }
            } catch (err) {
                addToConsole(`Unexpected error: ${err.message}`, 'error');
                stopExecution();
                return;
            }

            currentLineIndex++;
        }

        if (isRunning) {
            addToConsole('Script executed successfully.', 'success');
            isRunning = false;
        }
    }

    async function executeLine(line) {
        // 1. Comments
        if (line.startsWith('bookname:')) {
            return 'OK';
        }

        // 2. Final termination
        if (line === 'pass!') {
            addToConsole('Script terminated (pass!).', 'success');
            return 'STOP';
        }

        // 3. Temporary termination (end!)
        if (line === 'end!') {
            if (lineCounter <= 150) {
                addToConsole('Temporary stop (end!).', 'info');
                return 'STOP';
            }
        }

        // 4. Variable declaration
        const defMatch = line.match(/^(var|Dnumber|character|word|TFvar)\s*=\s*([^;]+);?$/);
        if (defMatch) {
            const type = defMatch[1];
            const varName = defMatch[2].trim();
            if (variables.hasOwnProperty(varName)) {
                addToConsole(`Warning: Variable "${varName}" redefined.`, 'warning');
            }
            variables[varName] = null;
            varTypes[varName] = type;
            addToConsole(`Variable defined: ${varName} (type: ${type})`, 'info');
            return 'OK';
        }

        // 5. Assignment
        const assignMatch = line.match(/^(\w+)\s*=\s*(.+);?$/);
        if (assignMatch && assignMatch[1] !== 'reload!') {
            const varName = assignMatch[1];
            let rawValue = assignMatch[2].trim();

            if (rawValue.endsWith(';')) rawValue = rawValue.slice(0, -1);
            let value = rawValue;
            if ((value.startsWith('"') && value.endsWith('"')) || (value.startsWith("'") && value.endsWith("'"))) {
                value = value.slice(1, -1);
            }

            if (constants.has(varName)) {
                addToConsole(`Error: Cannot change constant "${varName}".`, 'error');
                return 'ERROR';
            }

            if (!variables.hasOwnProperty(varName) && varName !== 'msg.out') {
                addToConsole(`Error: Variable "${varName}" not defined.`, 'error');
                return 'ERROR';
            }

            if (varTypes[varName] && !validateType(varName, value)) {
                return 'ERROR';
            }

            variables[varName] = value;
            addToConsole(`Assigned: ${varName} = ${value}`, 'info');
            return 'OK';
        }

        // 6. const
        const constMatch = line.match(/^const\s+(\w+)\s*=\s*(.+);?$/);
        if (constMatch) {
            let constName = constMatch[1];
            let rawValue = constMatch[2].trim();
            if (rawValue.endsWith(';')) rawValue = rawValue.slice(0, -1);
            let value = rawValue;
            if ((value.startsWith('"') && value.endsWith('"')) || (value.startsWith("'") && value.endsWith("'"))) {
                value = value.slice(1, -1);
            }

            if (variables.hasOwnProperty(constName)) {
                addToConsole(`Error: Variable "${constName}" already exists.`, 'error');
                return 'ERROR';
            }

            variables[constName] = value;
            constants.add(constName);
            varTypes[constName] = 'const';
            addToConsole(`Constant defined: ${constName} = ${value}`, 'info');
            return 'OK';
        }

        // 7. let
        const letMatch = line.match(/^let\s+(\w+)\s*=\s*(.+);?$/);
        if (letMatch) {
            let letName = letMatch[1];
            let rawValue = letMatch[2].trim();
            if (rawValue.endsWith(';')) rawValue = rawValue.slice(0, -1);
            let value = rawValue;
            if ((value.startsWith('"') && value.endsWith('"')) || (value.startsWith("'") && value.endsWith("'"))) {
                value = value.slice(1, -1);
            }

            if (variables.hasOwnProperty(letName)) {
                addToConsole(`Error: Variable "${letName}" already exists.`, 'error');
                return 'ERROR';
            }

            variables[letName] = value;
            varTypes[letName] = 'let';
            addToConsole(`Let variable defined: ${letName} = ${value}`, 'info');
            return 'OK';
        }

        // 8. Library import
        if (line.startsWith('get lib:')) {
            const libMatch = line.match(/get lib:\("(.+)"\)/);
            if (libMatch) {
                const libName = libMatch[1];
                if (libName === 'calculator') {
                    calculatorEnabled = true;
                    addToConsole('Calculator library loaded successfully.', 'success');
                } else {
                    addToConsole(`Unknown library: "${libName}".`, 'warning');
                }
            }
            return 'OK';
        }

        // 9. msg.log
        if (line.startsWith('msg.log:')) {
            const logMatch = line.match(/msg\.log:\("(.+)"\)/);
            if (logMatch) {
                let content = logMatch[1];
                
                for (let [key, value] of Object.entries(variables)) {
                    const regex = new RegExp('\\b' + key + '\\b', 'g');
                    content = content.replace(regex, value !== null ? value : 'undefined');
                }

                if (calculatorEnabled && /^[\d\s\+\-\*\/\(\)\.]+$/.test(content)) {
                    try {
                        const fn = new Function('return ' + content);
                        const result = fn();
                        content = result.toString();
                    } catch (e) {
                        // Not a valid expression, keep as is
                    }
                }

                lastLogMessage = content;
                addToConsole(content, 'success');
            } else {
                addToConsole(`Invalid msg.log format: ${line}`, 'warning');
            }
            return 'OK';
        }

        // 10. reload!
        if (line.startsWith('reload! =')) {
            const reloadMatch = line.match(/reload!\s*=\s*\(?"?(\d+)"?\)?/);
            if (reloadMatch) {
                const times = parseInt(reloadMatch[1]);
                if (lastLogMessage) {
                    addToConsole(`Repeating last message ${times} times:`, 'warning');
                    for (let i = 0; i < times; i++) {
                        addToConsole(`  [${i+1}] ${lastLogMessage}`, 'info');
                    }
                } else {
                    addToConsole('No previous message to repeat.', 'warning');
                }
            } else {
                addToConsole(`Invalid reload! format: ${line}`, 'warning');
            }
            return 'OK';
        }

        // 11. if var
        if (line.startsWith('if var')) {
            const ifMatch = line.match(/if var\s+(\w+)\s*=\s*\(?"?([^")]+)"?\)?/);
            if (ifMatch) {
                const varName = ifMatch[1];
                let expectedValue = ifMatch[2].replace(/[";]/g, '').trim();

                if ((expectedValue.startsWith('"') && expectedValue.endsWith('"')) || (expectedValue.startsWith("'") && expectedValue.endsWith("'"))) {
                    expectedValue = expectedValue.slice(1, -1);
                }

                const actualValue = variables[varName];
                if (actualValue == expectedValue) {
                    addToConsole(`Condition true: ${varName} = ${actualValue}`, 'success');
                } else {
                    addToConsole(`Condition false: ${varName} = ${actualValue} (expected: ${expectedValue}), skipping next line.`, 'error');
                    currentLineIndex++;
                }
            }
            return 'OK';
        }

        // 12. msg.out (prompt)
        if (line.startsWith('msg.out:')) {
            const outMatch = line.match(/msg\.out:\("(.+)"\)/);
            if (outMatch) {
                const message = outMatch[1];
                addToConsole(message, 'input');

                const userInput = prompt(message, '');
                if (userInput !== null) {
                    variables['msg.out'] = userInput;
                    addToConsole(`Received input: ${userInput}`, 'success');
                } else {
                    addToConsole('Input canceled by user.', 'warning');
                    variables['msg.out'] = '';
                }
            }
            return 'OK';
        }

        // 13. if typed
        if (line.startsWith('if typed')) {
            const typedMatch = line.match(/if typed\s+(\d+)\s+in\s+(\w+)/);
            if (typedMatch) {
                const expectedValue = typedMatch[1];
                const varName = typedMatch[2];
                addToConsole(`Waiting for input for variable ${varName} (must be ${expectedValue})...`, 'warning');

                const userInput = prompt(`Please enter a value for ${varName}:`, '');
                if (userInput !== null) {
                    variables[varName] = userInput;
                    addToConsole(`Received: ${varName} = ${userInput}`, 'success');

                    if (userInput == expectedValue) {
                        addToConsole('Input correct, continuing execution.', 'success');
                    } else {
                        addToConsole(`Input incorrect (expected ${expectedValue}), skipping next line.`, 'error');
                        currentLineIndex++;
                    }
                } else {
                    addToConsole('Input canceled by user.', 'warning');
                }
            } else {
                addToConsole(`Invalid if typed format: ${line}`, 'warning');
            }
            return 'OK';
        }

        // 14. greet
        if (line.startsWith('greet')) {
            const greetMatch = line.match(/greet\s+(\w+):\("(.+)"\)/);
            if (greetMatch) {
                const greetName = greetMatch[1];
                const greetValue = greetMatch[2];
                variables[greetName] = greetValue;
                addToConsole(`Hello ${greetValue}!`, 'success');
            } else {
                addToConsole(`Invalid greet format: ${line}`, 'warning');
            }
            return 'OK';
        }

        if (line !== '') {
            addToConsole(`Unknown command: ${line}`, 'warning');
        }
        return 'OK';
    }

    // Monaco Editor setup
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
    require(['vs/editor/editor.main'], function () {
        monaco.languages.register({ id: 'roland' });
        monaco.languages.setMonarchTokensProvider('roland', {
            tokenizer: {
                root: [
                    [/hi roland\.script!/, "keyword-start"],
                    [/pass!|end!/, "keyword-stop"],
                    [/var|Dnumber|character|word|TFvar|const|let/, "type"],
                    [/if var|if typed|get lib:|reload!|greet|bookname:/, "function"],
                    [/msg\.(log|out):/, "function"],
                    [/"([^"\\]|\\.)*"/, "string"],
                    [/\b\d+(\.\d+)?\b/, "number"],
                    [/\b(true|false)\b/, "constant"],
                    [/[=;():]/, "delimiter"],
                ]
            }
        });

        monaco.editor.defineTheme('rolandTheme', {
            base: 'vs-dark',
            inherit: true,
            rules: [
                { token: 'keyword-start', foreground: '569CD6', fontStyle: 'bold' },
                { token: 'keyword-stop', foreground: 'F44747', fontStyle: 'bold' },
                { token: 'type', foreground: '569CD6' },
                { token: 'function', foreground: 'DCDCAA' },
                { token: 'string', foreground: 'CE9178' },
            ],
            colors: { 'editor.background': '#1e1e1e' }
        });

        monacoEditor = monaco.editor.create(document.getElementById('editor-container'), {
            value: `hi roland.script!
bookname:("Roland Script Example")

// Variable declarations
var = X;
X = 5;

Dnumber = Y;
Y = 3.14;

word = Name;
Name = ammar;

TFvar = isCool;
isCool = true;

character = Letter;
Letter = A;

// Using calculator library
get lib:("calculator")
msg.log:("2+43")
msg.log:("10-3")

// Conditions
if var X = ("5")
msg.log:("X equals 5")

// Constants
const Dnumber PI = 3.14;
msg.log:("Dnumber = PI")

// Repetition
msg.log:("Hello!")
reload! = ("3")

// Greet
greet user:("Sarah")
msg.log:("Hello + user")

// User input
msg.out:("Enter your name:")
msg.log:("Hello + msg.out")

// if_typed
if typed 34 in age
msg.log:("Age is correct")

pass!`,
            language: 'roland',
            theme: 'rolandTheme',
            fontSize: 16,
            automaticLayout: true
        });
    });

    // Button functions
    function loadExample() {
        const example = `hi roland.script!
bookname:("Test Program")

// Variables
var = age;
age = 25;

Dnumber = price;
price = 99.99;

word = name;
name = ahmed;

TFvar = isStudent;
isStudent = true;

character = grade;
grade = A;

// Calculator library
get lib:("calculator")
msg.log:("15+27")

// Conditions
if var age = ("25")
msg.log:("Age is 25")

// Constants
const Dnumber PI = 3.14;
msg.log:("PI")

// Repetition
msg.log:("Hello!")
reload! = ("3")

// Greet
greet user:("Sarah")
msg.log:("Hello + user")

// User input
msg.out:("Enter your favorite number:")
msg.log:("Your number is + msg.out")

// if_typed
if typed 34 in code
msg.log:("You entered the correct number")

pass!`;
        monacoEditor.setValue(example);
    }

    function downloadCode() {
        const code = monacoEditor.getValue();
        const blob = new Blob([code], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'script.roland';
        a.click();
        URL.revokeObjectURL(url);
    }

    function toggleSettingsMenu(e) {
        e.stopPropagation();
        const menu = document.getElementById('settingsMenu');
        menu.classList.toggle('show');
    }

    window.onclick = function (e) {
        const menu = document.getElementById('settingsMenu');
        if (menu.classList.contains('show') && !e.target.closest('.btn') && !e.target.closest('.dropdown-menu')) {
            menu.classList.remove('show');
        }
    };
</script>
</body>
</html>
